<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code - Acesso Proprietário</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #070909 0%, #1a1a1a 100%);
      color: #f4f4f0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .qr-container {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 32px;
      backdrop-filter: blur(10px);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 2rem;
      margin-bottom: 8px;
      color: #f4f4f0;
    }

    .subtitle {
      color: #b6b8b3;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin: 24px 0;
      background: white;
      padding: 16px;
      border-radius: 16px;
    }

    .qr-info {
      background: rgba(34,242,122,0.1);
      border: 1px solid rgba(34,242,122,0.3);
      border-radius: 12px;
      padding: 16px;
      margin-top: 24px;
      font-size: 0.85rem;
      color: #b6b8b3;
    }

    .qr-info strong {
      color: #22f27a;
      display: block;
      margin-bottom: 8px;
    }

    .manual-link {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    .manual-link p {
      color: #b6b8b3;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }

    .manual-link a {
      display: inline-block;
      background: linear-gradient(180deg, #22f27a, #10cf5f);
      color: #04120a;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
      font-size: 0.9rem;
      transition: 0.2s;
      box-shadow: 0 10px 30px rgba(34,242,122,0.22);
    }

    .manual-link a:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(34,242,122,0.3);
    }

    .print-btn {
      margin-top: 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #f4f4f0;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.2s;
    }

    .print-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    @media (max-width: 480px) {
      .qr-container {
        padding: 24px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .qr-info {
        font-size: 0.8rem;
      }
    }

    @media print {
      body {
        background: white;
      }

      .qr-container {
        background: white;
        border: 1px solid #ccc;
        box-shadow: none;
      }

      h1, .subtitle {
        color: #000;
      }

      .manual-link, .print-btn {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="qr-container">
    <h1>Sr. Altino</h1>
    <div class="subtitle">Escaneie para acessar a Área do Proprietário</div>

    <div id="qrcode"></div>

    <div class="qr-info">
      <strong>🔐 Código de Acesso</strong>
      Escaneie este QR Code com seu celular para fazer login na área do proprietário.
    </div>

    <div class="manual-link">
      <p>Não consegue escanear?</p>
      <a href="login.html">Clique aqui para fazer login</a>
      <button class="print-btn" onclick="window.print()">🖨️ Imprimir QR Code</button>
    </div>
  </div>

  <!-- Script para gerar QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    // Obtém a URL base do site
    const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/');
    const loginUrl = baseUrl + '/login.html';

    // Gera o QR Code
    new QRCode(document.getElementById('qrcode'), {
      text: loginUrl,
      width: 200,
      height: 200,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
