<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmação de Presença - Sr. Altino</title>
  <style>
    :root {
      --bg: #070909;
      --accent: #22f27a;
      --accent-dark: #10cf5f;
      --text: #f4f4f0;
      --muted: #b6b8b3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(34,242,122,0.12), transparent 30%),
                  radial-gradient(circle at bottom right, rgba(34,242,122,0.07), transparent 30%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 380px;
      width: 100%;
      backdrop-filter: blur(18px);
    }
    .icon {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 26px;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    .highlight { color: var(--accent); }
    p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .event-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin: 16px 0;
      padding: 14px;
      background: rgba(34,242,122,0.08);
      border: 1px solid rgba(34,242,122,0.2);
      border-radius: 12px;
    }
    .status-ok {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(34,242,122,0.12);
      border: 1px solid rgba(34,242,122,0.3);
      color: var(--accent);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 20px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(34,242,122,0.8);
    }
    .brand {
      margin-top: 32px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .already {
      color: var(--muted);
      font-size: 13px;
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon" id="pageIcon">🎉</span>
    <h1 id="pageTitle">Presença <span class="highlight">Confirmada!</span></h1>
    <div class="event-name" id="eventName">Carregando...</div>
    <p id="pageMsg">Estamos te esperando!</p>
    <div class="status-ok" id="statusOk" style="display:none;">
      <span class="dot"></span> Confirmação registrada
    </div>
    <div class="already" id="alreadyMsg" style="display:none;">
      Você já havia confirmado presença anteriormente.
    </div>
  </div>
  <div class="brand">SR. ALTINO BAR · Osasco, SP</div>

  <script>
    const params = new URLSearchParams(location.search);
    const cId = params.get('c');   // campaign id
    const tel = params.get('t');   // phone (encoded)
    const nome = params.get('n') ? decodeURIComponent(params.get('n')) : 'Convidado';

    // Recuperar dados da campanha
    let eventName = 'Evento Sr. Altino';
    try {
      const campanhas = JSON.parse(localStorage.getItem('campanhas') || '[]');
      const camp = campanhas.find(c => String(c.id) === String(cId));
      if (camp) eventName = camp.titulo;
    } catch(e) {}

    document.getElementById('eventName').textContent = eventName;
    document.getElementById('pageTitle').innerHTML = `Olá, <span class="highlight">${nome}!</span>`;
    document.getElementById('pageMsg').textContent = 'Sua presença está confirmada. Te esperamos no Sr. Altino! 🍻';

    // Registrar confirmação
    const key = 'confirmacoes';
    const confirmacoes = JSON.parse(localStorage.getItem(key) || '[]');
    const jaConfirmou = confirmacoes.some(c => c.cId === cId && c.tel === tel);

    if (jaConfirmou) {
      document.getElementById('pageIcon').textContent = '✅';
      document.getElementById('alreadyMsg').style.display = 'block';
    } else {
      confirmacoes.push({
        cId,
        tel,
        nome,
        data: new Date().toLocaleDateString('pt-BR'),
        hora: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
      });
      localStorage.setItem(key, JSON.stringify(confirmacoes));
      document.getElementById('statusOk').style.display = 'inline-flex';
    }

    // Enviar para n8n se configurado
    try {
      const webhookUrl = localStorage.getItem('n8n_webhook_base_url');
      if (webhookUrl) {
        fetch(webhookUrl + '/confirmacao', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cId, tel, nome, eventName, timestamp: new Date().toISOString() })
        }).catch(() => {});
      }
    } catch(e) {}
  </script>
</body>
</html>
