[build]
  command = "echo 'Build complete'"
  publish = "."

[[redirects]]
  from = "/proposta"
  to = "/PROPOSTA-SR-ALTINO.html"
  status = 200

[[redirects]]
  from = "/analise"
  to = "/ANALISE-PRESENCA-ONLINE.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/proprietario.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "development" }

[headers]
  [[headers.values]]
    key = "Cache-Control"
    value = "max-age=3600"

  [[headers.values]]
    key = "X-Content-Type-Options"
    value = "nosniff"

  [[headers.values]]
    key = "X-Frame-Options"
    value = "SAMEORIGIN"
